<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SocNet</title>
    <style>
      html, body { margin: 0; min-height: 100%; background: #1a1b26; color: #c0caf5; font-family: system-ui, sans-serif; }
      #root { min-height: 100vh; padding: 1rem; }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="loader">Загрузка SocNet…</div>
    </div>
    <script type="module" src="./src/main.tsx"></script>
    <script>
      window.addEventListener('error', function(e) {
        var el = document.getElementById('loader') || document.getElementById('root');
        if (el) el.innerHTML = '<div style="color:#f7768e;padding:1rem"><h2>Ошибка</h2><pre>' + (e.message || e.error) + '</pre></div>';
      });
    </script>
  </body>
</html>
