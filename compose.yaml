services:
  socnet.api:
    image: socnet.api
    build:
      context: .
      dockerfile: SocNet.Api/Dockerfile
    ports:
      - "5119:5119"
      - "8080:8080"
    depends_on:
      - postgres
      - redis
      
  postgres:
    image: postgres:17.6
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: socnet
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    ports:
      - "6379:6379"
    restart: always

volumes:
  postgres_data:
    driver: local